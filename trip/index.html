<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Trip Countdown 💖</title>

  <link rel="stylesheet" href="style.css">

  <!-- 🍎 iOS APP MODE -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Our Trip 💗">

  <!-- 📱 ICON -->
  <link rel="apple-touch-icon" href="/trip/appicon.png">

  <!-- ⚙️ PWA MANIFEST -->
  <link rel="manifest" href="/trip/manifest.json">
</head>

<div id="effects"></div>

<body>

  <!-- 🔐 LOCK SCREEN -->
  <div id="lockScreen">

    <div class="lockBox">

      <div class="lockTitle">Enter Passcode</div>
      <div class="lockSub">It a Secret. Love But Not Say.</div>

      <input id="codeInput" type="password" maxlength="6" placeholder="••••••"/>

      <button onclick="checkCode()">Unlock</button>

      <div id="error">Wrong passcode</div>

    </div>

  </div>

  <!-- 🔓 APP -->
  <div id="app">

    <div class="lockscreen">

      <div class="time">Our Trip !!</div>

      <div class="date">
        Counting down to June 26, 2026
      </div>

      <div class="widget">

        <div class="label">TIME LEFT</div>
        <div id="countdown">--</div>

        <div class="sub">
          So Soon Baby 💖
        </div>

      </div>

      <div class="musicWidget">
        <div class="label">BABY'S JAMS</div>

        <iframe
          src="https://open.spotify.com/embed/playlist/01wKA0NyhP6EoFjGDKVO1W"
          width="100%"
          height="80"
          frameborder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
